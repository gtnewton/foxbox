# foxbox extension list
# One extension per line: AMO-slug  extension-GUID
# Comment out or delete a line to skip that extension.
#
# To find an extension's slug:
#   Last segment of its AMO URL — addons.mozilla.org/en-US/firefox/addon/{slug}/
#
# To find the GUID:
#   curl -s "https://addons.mozilla.org/api/v5/addons/addon/{slug}/" | python3 -c "import sys,json; print(json.load(sys.stdin)['guid'])"
# Note the the GUID may be a fixed UUID like c45c406e-ab73-11d8-be73-000a95be3b12
# or a string like extension@tabliss.io
# Themes use the same format and will be installed into the profile, but Firefox
# will not automatically activate them. Open about:addons after first launch to
# select the active theme.

# Extensions
