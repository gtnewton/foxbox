# foxbox extension list
# One extension per line: AMO-slug  extension-GUID
# Comment out or delete a line to skip that extension.
#
# Changes here take effect only after re-running install.sh (overwrite the
# existing profile). Editing this file does not affect a running foxbox session
# or an already-created master profile.
#
# To find an extension's slug:
#   Last segment of its AMO URL — addons.mozilla.org/en-US/firefox/addon/{slug}/
#
# To find the GUID:
#   curl -s "https://addons.mozilla.org/api/v5/addons/addon/{slug}/" | python3 -c "import sys,json; print(json.load(sys.stdin)['guid'])"
#
# GUID format: use the value exactly as returned by the API above.
#   UUID-style GUIDs include curly braces:  {c45c406e-ab73-11d8-be73-000a95be3b12}
#   Email-style GUIDs do not:               extension@tabliss.io
# Using braces around an email-style GUID will silently prevent the extension
# from loading (Firefox matches the XPI filename against the extension's
# internal ID, and the braces cause a mismatch).
#
# Themes use the same format and will be installed into the profile, but Firefox
# will not automatically activate them. Open about:addons after first launch to
# select the active theme.

